<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <title>{{TITLE}}</title>
  <meta name="description" content="{{DESC}}" />
  <link rel="canonical" href="{{CANONICAL}}" />
  <meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1" />
  <meta name="googlebot" content="index, follow" />
  <meta name="author" content="ClawB1t and contributors" />
  <meta name="generator" content="Syncr static site" />
  <meta name="theme-color" content="#0b0c0f" />
  <meta name="color-scheme" content="dark" />
  <meta name="application-name" content="{{SITE_NAME}}" />
  <meta name="apple-mobile-web-app-title" content="{{SITE_NAME}}" />
  <meta name="keywords" content="Syncr, Discord Rich Presence, Firefox extension, Discord status, YouTube Music Discord, Netflix Discord presence, Reddit Discord, Proton Mail, PreMiD alternative, open source, rich presence, now playing Discord" />

  <!-- Open Graph -->
  <meta property="og:title" content="{{TITLE}}" />
  <meta property="og:description" content="{{DESC}}" />
  <meta property="og:type" content="{{OG_TYPE}}" />
  <meta property="og:url" content="{{URL}}" />
  <meta property="og:image" content="{{OG_IMAGE}}" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />
  <meta property="og:image:alt" content="Syncr, Discord Rich Presence for Firefox" />
  <meta property="og:site_name" content="{{SITE_NAME}}" />
  <meta property="og:locale" content="{{LOCALE}}" />

  <!-- Twitter -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="{{TITLE}}" />
  <meta name="twitter:description" content="{{DESC}}" />
  <meta name="twitter:image" content="{{OG_IMAGE}}" />
  <meta name="twitter:image:alt" content="Syncr, Discord Rich Presence for Firefox" />{{TWITTER_SITE}}

  <!-- Icons + manifest -->
  <link rel="icon" href="{{DEPTH}}assets/icon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="{{DEPTH}}assets/syncrlogo.png" />
  <link rel="manifest" href="{{DEPTH}}site.webmanifest" />

  <!-- Perf hints -->
  <link rel="dns-prefetch" href="https://api.github.com" />
  <link rel="stylesheet" href="{{DEPTH}}styles.css?v={{BUILD}}" />

  <!-- Web-bridge gates, inlined so a stale cached stylesheet can never leak the
       wrong UI. The extension sets data-syncr-extension="true" on <html> before
       first paint, so the right view is chosen with zero flash. Container-level
       toggles only — inner buttons keep their natural display. -->
  <style>
    .syncr-installed-gate { display: none !important; }
    html[data-syncr-extension="true"] .get-syncr-gate { display: none !important; }
    html[data-syncr-extension="true"] #syncrDashboard { display: block !important; }
    html[data-syncr-extension="true"].syncr-show-marketing #marketing-content { display: block !important; }
  </style>

  <script type="application/ld+json">{{JSONLD}}</script>
</head>
